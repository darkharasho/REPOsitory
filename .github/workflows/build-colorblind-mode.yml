name: Build ColorblindMode

on:
  push:
    branches: ["main"]
    paths:
      - "mods/colorblind-mode/**"
      - ".github/workflows/build-colorblind-mode.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mods/colorblind-mode/**"
      - ".github/workflows/build-colorblind-mode.yml"

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: mods/colorblind-mode
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          dotnet build ColorblindMode.csproj \
            --configuration Release \
            /p:GameDir="/var/mnt/data/SteamLibrary/steamapps/common/REPO/"
