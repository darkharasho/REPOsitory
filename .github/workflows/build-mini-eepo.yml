name: Build MiniEepo

on:
  push:
    branches: ["main"]
    paths:
      - "mods/mini-eepo/**"
      - ".github/workflows/build-mini-eepo.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mods/mini-eepo/**"
      - ".github/workflows/build-mini-eepo.yml"

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: mods/mini-eepo
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          dotnet build MiniEepo.csproj \
            --configuration Release \
            /p:GameDir="/var/mnt/data/SteamLibrary/steamapps/common/REPO/"
