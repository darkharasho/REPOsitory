name: Build CondensedPlayerList

on:
  push:
    branches: ["main"]
    paths:
      - "mods/condensed-player-list/**"
      - ".github/workflows/build-condensed-player-list.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mods/condensed-player-list/**"
      - ".github/workflows/build-condensed-player-list.yml"

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: mods/condensed-player-list
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          dotnet build CondensedPlayerList.csproj \
            --configuration Release \
            /p:GameDir="/var/mnt/data/SteamLibrary/steamapps/common/REPO/"
