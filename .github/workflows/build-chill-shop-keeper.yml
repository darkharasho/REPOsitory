name: Build ChillShopKeeper

on:
  push:
    branches: ["main"]
    paths:
      - "mods/chill-shop-keeper/**"
      - ".github/workflows/build-chill-shop-keeper.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mods/chill-shop-keeper/**"
      - ".github/workflows/build-chill-shop-keeper.yml"

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: mods/chill-shop-keeper
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          dotnet build ChillShopKeeper.csproj \
            --configuration Release \
            /p:GameDir="/var/mnt/data/SteamLibrary/steamapps/common/REPO/"
